<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Portal — SmartReads</title>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/user.css">
  <style>
    .portal-body { padding: 2rem 2.5rem; display: grid; grid-template-columns: 1fr 290px; gap: 2rem; position: relative; z-index: 1; }
    .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.25rem; }
    .book-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; transition: all .25s ease; display: flex; flex-direction: column; gap: .75rem; }
    .book-card:hover { border-color: var(--gold-dim); transform: translateY(-2px); box-shadow: var(--shadow); }
    .book-cover { width: 52px; height: 68px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; }
    .book-card-header { display: flex; gap: 1rem; align-items: flex-start; }
    .book-info { flex: 1; min-width: 0; }
    .book-info h4 { font-weight: 600; font-size: .95rem; line-height: 1.3; margin-bottom: .2rem; }
    .book-info .author { font-size: .78rem; color: var(--text-muted); }
    .book-pills { display: flex; gap: .4rem; flex-wrap: wrap; }
    .book-actions { margin-top: .25rem; }
    /* Profile */
    .profile-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.75rem; position: sticky; top: 80px; height: fit-content; }
    .profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg,var(--gold-dim),var(--gold)); display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1rem; }
    .profile-name { text-align: center; font-weight: 600; font-size: 1rem; margin-bottom: .2rem; }
    .profile-email { text-align: center; font-size: .78rem; color: var(--text-muted); margin-bottom: 1.25rem; }
    .profile-row { display: flex; justify-content: space-between; align-items: center; padding: .55rem 0; border-bottom: 1px solid var(--border); font-size: .82rem; }
    .profile-row:last-child { border-bottom: none; }
    .profile-row .k { color: var(--text-muted); }
    .profile-row .v { color: var(--gold); font-weight: 600; }
    .borrow-item { display: flex; align-items: center; justify-content: space-between; padding: .4rem 0; border-bottom: 1px solid var(--border); font-size: .8rem; }
    .borrow-item:last-child { border-bottom: none; }
    .section-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: .75rem; }
    @media (max-width: 900px) { .portal-body { grid-template-columns: 1fr; } .profile-card { position: static; } }
    @media (max-width: 600px) { .portal-body { padding: 1rem; } }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">📚 SmartReads <span class="badge">Library</span></div>
    <div class="nav-actions">
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Logout</button>
    </div>
  </nav>

  <div class="page-header">
    <h1 id="greeting">Welcome back!</h1>
    <p>Browse the collection, borrow and return books</p>
  </div>

  <div class="portal-body">
    <!-- Books -->
    <div>
      <div class="section-bar">
        <div class="section-title">📚 Book Collection</div>
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input class="form-control" type="text" id="search" placeholder="Search books..." oninput="renderBooks()" style="padding-left:2.6rem;width:210px">
        </div>
      </div>
      <div class="books-grid" id="books-grid"></div>
    </div>

    <!-- Profile -->
    <div>
      <div class="profile-card">
        <div class="profile-avatar">👤</div>
        <div class="profile-name" id="p-name">—</div>
        <div class="profile-email" id="p-email">—</div>
        <hr class="divider">
        <div class="profile-row"><span class="k">Roll No.</span><span class="v" id="p-roll">—</span></div>
        <div class="profile-row"><span class="k">Date of Birth</span><span class="v" id="p-dob">—</span></div>
        <div class="profile-row"><span class="k">Books Borrowed</span><span class="v" id="p-count">0</span></div>
        <hr class="divider">
        <div class="section-title" style="font-size:.9rem;margin-bottom:.75rem">📤 My Books</div>
        <div id="my-books"><span style="font-size:.82rem;color:var(--text-dim)">No borrowed books.</span></div>
      </div>
    </div>
  </div>

  <div id="toast"><span class="toast-icon" id="toast-icon">✅</span><span class="toast-msg" id="toast-msg"></span></div>
  <script src="js/data.js"></script>
  <script src="js/user_main.js"></script>
</body>
</html>
