<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login — SmartReads</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="css/user.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; position: relative; z-index: 1; }
    .auth-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 440px; animation: fadeUp 0.5s ease both; }
    .auth-box h2 { font-family: 'Playfair Display', serif; font-size: 1.75rem; margin-bottom: 0.4rem; }
    .auth-sub { color: var(--text-muted); font-size: .875rem; margin-bottom: 2rem; }
    .tabs { display: flex; background: var(--surface); border-radius: 8px; padding: 4px; margin-bottom: 1.75rem; gap: 4px; }
    .tab { flex: 1; text-align: center; padding: .5rem; border-radius: 6px; font-size: .85rem; font-weight: 500; cursor: pointer; color: var(--text-muted); transition: all .2s; }
    .tab.active { background: var(--gold); color: #0f0e0b; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">📚 SmartReads</div>
    <div class="nav-actions">
      <a href="index.html" class="btn btn-ghost btn-sm">← Back</a>
    </div>
  </nav>

  <main>
    <div class="auth-box">
      <h2>User Portal</h2>
      <p class="auth-sub">Login or create a new account to get started</p>

      <div class="tabs">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
        <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
      </div>

      <!-- LOGIN -->
      <div id="form-login">
        <div class="form-group">
          <label>Email Address</label>
          <input class="form-control" type="email" id="l-email" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-control" type="password" id="l-pass" placeholder="••••••••">
        </div>
        <button class="btn btn-gold btn-full btn-lg" onclick="doLogin()" style="margin-top:.5rem">Login</button>
        <p style="margin-top:1rem;font-size:.8rem;color:var(--text-dim);text-align:center">
          Don't have an account? <span style="color:var(--gold);cursor:pointer" onclick="switchTab('signup')">Sign up free</span>
        </p>
      </div>

      <!-- SIGNUP -->
      <div id="form-signup" style="display:none">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name *</label>
            <input class="form-control" id="s-name" placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Roll Number *</label>
            <input class="form-control" id="s-roll" placeholder="R2024001">
          </div>
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input class="form-control" type="email" id="s-email" placeholder="your@email.com">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Password *</label>
            <input class="form-control" type="password" id="s-pass" placeholder="Min. 6 chars">
          </div>
          <div class="form-group">
            <label>Date of Birth</label>
            <input class="form-control" type="date" id="s-dob">
          </div>
        </div>
        <button class="btn btn-gold btn-full btn-lg" onclick="doRegister()" style="margin-top:.5rem">Create Account</button>
        <p style="margin-top:1rem;font-size:.8rem;color:var(--text-dim);text-align:center">
          Already registered? <span style="color:var(--gold);cursor:pointer" onclick="switchTab('login')">Login here</span>
        </p>
      </div>
    </div>
  </main>

  <div id="toast"><span class="toast-icon" id="toast-icon">✅</span><span class="toast-msg" id="toast-msg"></span></div>
  <script src="js/data.js"></script>
  <script src="js/usr_login.js"></script>
</body>
</html>
