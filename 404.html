<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — SmartReads</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; position: relative; z-index: 1; }
    .content { text-align: center; max-width: 480px; animation: fadeUp 0.6s ease both; }
    .big-num { font-family: 'Playfair Display', serif; font-size: 8rem; line-height: 1; color: var(--gold); opacity: .3; }
    h1 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: .75rem; }
    p { color: var(--text-muted); margin-bottom: 2rem; line-height: 1.7; }
    .actions { display: flex; gap: 1rem; justify-content: center; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">📚 SmartReads</div>
    <div class="nav-actions">
      <a href="index.html" class="btn btn-ghost btn-sm">← Home</a>
    </div>
  </nav>
  <main>
    <div class="content">
      <div class="big-num">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved. Please check the URL or navigate back to the home page.</p>
      <div class="actions">
        <a href="index.html" class="btn btn-gold btn-lg">🏠 Go Home</a>
        <a href="javascript:history.back()" class="btn btn-ghost btn-lg">← Go Back</a>
      </div>
    </div>
  </main>
</body>
</html>
